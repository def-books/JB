<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="300" height="300">
  <defs>
    <radialGradient id="headGrad" cx="45%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#D4884A"/>
      <stop offset="55%" stop-color="#B8622A"/>
      <stop offset="100%" stop-color="#8B4010"/>
    </radialGradient>
    <radialGradient id="muzzleGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#E8C080"/>
      <stop offset="100%" stop-color="#C89850"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8B4A10"/>
      <stop offset="100%" stop-color="#2A0E00"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#C47030"/>
      <stop offset="100%" stop-color="#8B4010"/>
    </radialGradient>
    <radialGradient id="earInner" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#F0A080"/>
      <stop offset="100%" stop-color="#D07060"/>
    </radialGradient>
    <radialGradient id="blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E08060" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E08060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="noseGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5A3A30"/>
      <stop offset="100%" stop-color="#1A0A08"/>
    </radialGradient>
    <radialGradient id="headShine" cx="42%" cy="20%" r="40%">
      <stop offset="0%" stop-color="rgba(255,220,160,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,220,160,0)"/>
    </radialGradient>
  </defs>

  <!-- Body/chest -->
  <ellipse cx="100" cy="185" rx="58" ry="38" fill="url(#bodyGrad)"/>
  <ellipse cx="100" cy="178" rx="36" ry="24" fill="#D4884A" opacity="0.6"/>

  <!-- Ears - pointed -->
  <path d="M52,85 Q38,44 58,28 Q70,50 76,78 Z" fill="#B06030"/>
  <path d="M55,80 Q44,50 60,36 Q68,54 72,76 Z" fill="url(#earInner)"/>
  <path d="M148,85 Q162,44 142,28 Q130,50 124,78 Z" fill="#B06030"/>
  <path d="M145,80 Q156,50 140,36 Q132,54 128,76 Z" fill="url(#earInner)"/>

  <!-- Head -->
  <ellipse cx="100" cy="108" rx="70" ry="72" fill="url(#headGrad)"/>
  <ellipse cx="100" cy="108" rx="70" ry="72" fill="url(#headShine)"/>

  <!-- Muzzle -->
  <ellipse cx="100" cy="140" rx="40" ry="32" fill="url(#muzzleGrad)"/>
  <ellipse cx="82" cy="128" rx="18" ry="14" fill="#DDB070" opacity="0.7"/>
  <ellipse cx="118" cy="128" rx="18" ry="14" fill="#DDB070" opacity="0.7"/>

  <!-- Eye sockets -->
  <ellipse cx="72" cy="100" rx="22" ry="20" fill="rgba(80,30,0,0.15)"/>
  <ellipse cx="128" cy="100" rx="22" ry="20" fill="rgba(80,30,0,0.15)"/>

  <!-- Eyeballs -->
  <ellipse cx="72" cy="100" rx="19" ry="18" fill="white"/>
  <ellipse cx="128" cy="100" rx="19" ry="18" fill="white"/>

  <!-- Iris -->
  <ellipse cx="72" cy="102" rx="14" ry="14" fill="url(#eyeGrad)"/>
  <ellipse cx="128" cy="102" rx="14" ry="14" fill="url(#eyeGrad)"/>

  <!-- Pupils -->
  <ellipse cx="73" cy="103" rx="8" ry="9" fill="#0D0500"/>
  <ellipse cx="129" cy="103" rx="8" ry="9" fill="#0D0500"/>

  <!-- Eye shines -->
  <ellipse cx="66" cy="96" rx="5" ry="4" fill="white" opacity="0.9"/>
  <circle cx="79" cy="108" r="2.5" fill="white" opacity="0.5"/>
  <ellipse cx="122" cy="96" rx="5" ry="4" fill="white" opacity="0.9"/>
  <circle cx="135" cy="108" r="2.5" fill="white" opacity="0.5"/>

  <!-- Eyelid left - solid flap covering top of eye, same color as head fur -->
  <path d="M51,100 Q72,82 93,100 L93,86 Q72,70 51,86 Z" fill="#B8622A"/>
  <!-- Eyelid left edge/lash line -->
  <path d="M51,100 Q72,82 93,100" fill="none" stroke="#6A2E08" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyelid right - solid flap covering top of eye -->
  <path d="M107,100 Q128,82 149,100 L149,86 Q128,70 107,86 Z" fill="#B8622A"/>
  <!-- Eyelid right edge/lash line -->
  <path d="M107,100 Q128,82 149,100" fill="none" stroke="#6A2E08" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Lower lid left -->
  <path d="M54,113 Q72,120 90,113" fill="none" stroke="#7A3810" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Lower lid right -->
  <path d="M110,113 Q128,120 146,113" fill="none" stroke="#7A3810" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Cheek blush -->
  <ellipse cx="55" cy="118" rx="20" ry="14" fill="url(#blush)"/>
  <ellipse cx="145" cy="118" rx="20" ry="14" fill="url(#blush)"/>

  <!-- Nose -->
  <ellipse cx="100" cy="134" rx="13" ry="10" fill="url(#noseGrad)"/>
  <ellipse cx="95" cy="130" rx="5" ry="3.5" fill="rgba(255,255,255,0.22)"/>
  <ellipse cx="94" cy="135" rx="4" ry="3" fill="rgba(0,0,0,0.35)"/>
  <ellipse cx="106" cy="135" rx="4" ry="3" fill="rgba(0,0,0,0.35)"/>

  <!-- Mouth -->
  <line x1="100" y1="144" x2="100" y2="150" stroke="#8B5020" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M86,150 Q100,162 114,150" fill="none" stroke="#8B5020" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="100" cy="154" rx="8" ry="3" fill="rgba(220,150,100,0.3)"/>

  <!-- Whiskers -->
  <line x1="60" y1="134" x2="20" y2="126" stroke="rgba(240,220,180,0.75)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="60" y1="138" x2="18" y2="138" stroke="rgba(240,220,180,0.75)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="60" y1="142" x2="22" y2="150" stroke="rgba(240,220,180,0.75)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="140" y1="134" x2="180" y2="126" stroke="rgba(240,220,180,0.75)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="140" y1="138" x2="182" y2="138" stroke="rgba(240,220,180,0.75)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="140" y1="142" x2="178" y2="150" stroke="rgba(240,220,180,0.75)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Forehead fur lines -->
  <path d="M78,66 Q100,58 122,66" fill="none" stroke="#8B4010" stroke-width="1" opacity="0.3"/>
  <path d="M82,74 Q100,68 118,74" fill="none" stroke="#8B4010" stroke-width="0.8" opacity="0.2"/>

</svg>
